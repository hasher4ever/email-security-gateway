# Lookalike domain detection — maps populated by feeds/dnstwist_runner.py
# and feeds/feed_pull.py.

LOOKALIKE_SENDER {
    type   = "from";
    filter = "email:domain";
    map    = "/etc/rspamd/lists/lookalike_domains.map";
    score  = 8.0;
    description = "Sender domain matches a known typosquat of our trusted domains";
}

LOOKALIKE_URL {
    type   = "url";
    filter = "tld";
    map    = "/etc/rspamd/lists/lookalike_domains.map";
    score  = 6.0;
    description = "Body URL points at a known typosquat domain";
}

KNOWN_PHISH_URL {
    type   = "url";
    filter = "full";
    map    = "/etc/rspamd/lists/known_phish.map";
    score  = 12.0;
    description = "URL appears in PhishTank/OpenPhish/GSB feed";
}

ALLOWLIST_SENDER {
    type   = "from";
    filter = "email:domain";
    map    = "/etc/rspamd/lists/allowlist.map";
    score  = -8.0;
    description = "Sender domain is on the security-team allowlist";
}

RISKY_ATTACHMENT_EXT {
    type   = "filename";
    map    = "/etc/rspamd/lists/risky_extensions.map";
    score  = 10.0;
    description = "Attachment carries an extension that is almost never benign in our environment";
}
