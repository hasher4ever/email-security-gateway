<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Driver Pay Portal</title>
    <style>
      body { margin: 0; font-family: Verdana, Arial, sans-serif;
             background: #eaf0f2; color: #222; }
      .top { background: #2a6e3f; color: #fff; padding: 12px 22px;
             font-size: 16px; font-weight: 600; }
      .box { max-width: 380px; margin: 60px auto; background: #fff;
             border: 1px solid #cfd6da; padding: 26px; border-radius: 4px; }
      h3 { margin: 0 0 10px; }
      label { display: block; font-size: 12px; color: #444; margin: 10px 0 4px; }
      input { width: 100%; padding: 8px; box-sizing: border-box;
              border: 1px solid #c0c6cd; border-radius: 3px; font-size: 14px; }
      button { width: 100%; margin-top: 18px; padding: 10px;
               background: #2a6e3f; color: #fff; border: 0; border-radius: 3px;
               font-size: 14px; cursor: pointer; }
      .foot { font-size: 11px; color: #888; text-align: center; margin-top: 14px; }
    </style>
  </head>
  <body>
    <div class="top">Driver Pay Portal</div>
    <div class="box">
      <h3>Sign in to view this week's settlement</h3>
      <form action="{{.URL}}" method="post" autocomplete="off">
        <input type="hidden" name="rid" value="{{.RId}}">
        <label for="cu">Company username</label>
        <input id="cu" name="company_user" type="text">
        <label for="cp">Password</label>
        <input id="cp" name="company_pw" type="password">
        <button type="submit">Sign in</button>
      </form>
      <p class="foot">Single sign-on with your company credentials.</p>
    </div>
  </body>
</html>
